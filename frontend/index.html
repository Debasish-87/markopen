<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Markopen — Find Open Shops Near You</title>
    <meta name="description" content="Find open shops near you — browse local businesses by category, check hours, and discover what's open right now." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#D4880A" />
    <meta name="author" content="Markopen" />
    <meta name="keywords" content="open shops, local businesses, shop directory, find shops near me, shop hours, Bhubaneswar shops" />

    <!-- Canonical -->
    <link rel="canonical" href="https://markopen.in" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Markopen" />
    <meta property="og:title"       content="Markopen — Find Open Shops Near You" />
    <meta property="og:description" content="Find open shops near you — browse local businesses by category, check hours, and discover what's open right now." />
    <meta property="og:url"         content="https://markopen.in" />
    <meta property="og:image"       content="https://markopen.in/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Markopen — Find Open Shops Near You" />
    <meta name="twitter:description" content="Find open shops near you — browse local businesses, check hours, discover what's open right now." />
    <meta name="twitter:image"       content="https://markopen.in/og-default.png" />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180"      href="/apple-touch-icon.png" />
    <link rel="manifest"                              href="/site.webmanifest" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json" id="structured-data">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Markopen",
      "url": "https://markopen.in",
      "description": "Find open shops near you — browse local businesses by category, check hours, and discover what's open right now.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://markopen.in?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
